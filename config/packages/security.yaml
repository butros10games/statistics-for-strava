security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
            algorithm: auto

    providers:
        app_users:
            id: App\Infrastructure\Security\AppUserProvider

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|css|images|js|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_users
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                default_target_path: /
            logout:
                path: _security_logout
                target: /login

    access_control:
        - { path: ^/strava/webhook, roles: PUBLIC_ACCESS }
        - { path: ^/(login|register|reset-password|verify-email), roles: PUBLIC_ACCESS }
        - { path: ^/assets, roles: PUBLIC_ACCESS }
        - { path: ^/logout$, roles: ROLE_USER }
        - { path: ^/, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
